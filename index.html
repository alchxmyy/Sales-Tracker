<!DOCTYPE html>
<html>
<head>
    <title>Sales Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 50px;
            background: #667eea;
        }
        .box {
            background: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 20px;
        }
        .number {
            font-size: 72px;
            font-weight: bold;
            color: #4CAF50;
            margin: 20px;
        }
        button {
            font-size: 24px;
            padding: 15px 30px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #4CAF50;
            color: white;
        }
        .reset {
            background: #f44336;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
        }
        .progress-container {
            margin: 20px 0;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .progress-bar-bg {
            background: #e0e0e0;
            border-radius: 25px;
            overflow: hidden;
            height: 30px;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #4CAF50, #45a049);
            width: 0%;
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
        }
        .target-info {
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>📊 Insurance Sales</h1>
    <div class="target-info" id="targetInfo">Loading target...</div>
    
    <div class="progress-container">
        <div class="progress-stats">
            <span>Progress</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar">0%</div>
        </div>
    </div>
    
    <div class="number"><span id="sales">--</span> / <span id="targetNumber">--</span></div>
    
    <button onclick="addOne()">+1 Sale</button>
    <button class="reset" onclick="resetSales()">Reset</button>
    <div id="status" class="status"></div>
</div>

<script>
    // IMPORTANT: Replace with YOUR actual Google Apps Script URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQwEIm9sG_2uVktVeWiaVq4VDYJhihwSu0K5nRKlfozGqAQ7AnEQEyTjIc1ZrmAbTg/exec';
    
    let currentTarget = 100;
    let currentSales = 0;
    
    async function loadTarget() {
        try {
            const response = await fetch(SCRIPT_URL + '?action=target');
            currentTarget = parseInt(await response.text());
            document.getElementById('targetInfo').innerText = 'Monthly Target: ' + currentTarget + ' policies';
            document.getElementById('targetNumber').innerText = currentTarget;
            loadSales();
        } catch(error) {
            console.error('Error loading target:', error);
            document.getElementById('targetInfo').innerText = 'Error loading target';
            loadSales();
        }
    }
    
    async function loadSales() {
        try {
            const response = await fetch(SCRIPT_URL + '?action=get');
            currentSales = parseInt(await response.text());
            document.getElementById('sales').innerText = currentSales;
            updateProgress();
        } catch(error) {
            document.getElementById('status').innerText = 'Error loading: ' + error.message;
        }
    }
    
    function updateProgress() {
        const percent = (currentSales / currentTarget) * 100;
        const percentDisplay = Math.min(percent, 100).toFixed(1);
        document.getElementById('progressPercent').innerText = percentDisplay + '%';
        document.getElementById('progressBar').style.width = Math.min(percent, 100) + '%';
        document.getElementById('progressBar').innerText = percentDisplay + '%';
    }
    
    async function addOne() {
        try {
            const response = await fetch(SCRIPT_URL + '?action=add');
            const result = await response.text();
            if(result === 'TARGET_REACHED') {
                document.getElementById('status').innerText = '🎉 Target reached! Congratulations team! 🎉';
            } else {
                document.getElementById('status').innerText = 'Sale recorded! +1 ✅';
                loadSales();
            }
        } catch(error) {
            document.getElementById('status').innerText = 'Error: ' + error.message;
        }
    }
    
    async function resetSales() {
        if(confirm('⚠️ Are you sure you want to reset ALL sales? This affects everyone!')) {
            try {
                await fetch(SCRIPT_URL + '?action=reset');
                loadSales();
                document.getElementById('status').innerText = 'Sales reset to 0';
            } catch(error) {
                document.getElementById('status').innerText = 'Error resetting: ' + error.message;
            }
        }
    }
    
    loadTarget();
</script>
</body>
</html>
