<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Insurance Sales Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .target-info {
            color: #666;
            margin-bottom: 30px;
        }

        .sales-number {
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
            margin: 20px 0;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-secondary {
            background: #f44336;
            color: white;
        }

        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

                .progress-container {
            margin-bottom: 30px;
        }
        
        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .progress-bar-bg {
            background: #e0e0e0;
            border-radius: 25px;
            overflow: hidden;
            height: 30px;
        }
        
        .progress-bar-fill {
            background: linear-gradient(90deg, #4CAF50, #45a049);
            width: 0%;
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Kassa - Service Verzekeringen </h1>
        <div class="target-info">Maandtarget 100 verzekeringen</div>

         <div class="progress-container">
            <div class="progress-stats">
                <span>Progress</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar">0%</div>
            </div>
        </div>

        <div class="sales-number">
            <span id="currentSales">--</span> / 100
        </div>
        
        <div>
            <button class="btn-primary" onclick="addSale()">+1 Sale</button>
            <button class="btn-secondary" onclick="resetSales()">Reset</button>
        </div>
        
        <div id="status" class="status"></div>
    </div>

    <script>
                // Your Google Apps Script URL from Step 9
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZQOwEKBkCtnn36zJWIJ3F8KuJajJIoe_aq5rXDK4UCZbHjAl1Uxjn-m8obqARbqj_/exec';

        // Function to get current sales from Google Sheet
        async function loadCurrentSales() {
            try {
                // Create URL with action parameter
                const url = `${SCRIPT_URL}?action=get`;
                
                // Fetch data from Google Sheet
                const response = await fetch(url);
                const sales = await response.text();
                
                // Update the display
                document.getElementById('currentSales').innerText = sales;
                
                // Update progress bar
                const percent = (sales / 100) * 100;
                document.getElementById('progressPercent').innerText = `${percent.toFixed(1)}%`;
                document.getElementById('progressBar').style.width = `${percent}%`;
                document.getElementById('progressBar').innerText = `${percent.toFixed(1)}%`;
                
            } catch (error) {
                console.error('Error loading sales:', error);
                showStatus('Failed to load sales data', 'error');
            }
        }
        
        // Function to add one sale
        async function addSale() {
            try {
                // Call the addOneSale function in Google Apps Script
                const response = await fetch(`${SCRIPT_URL}?action=add`);
                const result = await response.text();
                
                if (result === "TARGET_REACHED") {
                    showStatus('🎉 Target already reached! Congratulations team! 🎉', 'success');
                } else {
                    showStatus('Sale recorded! +1 added ✅', 'success');
                    // Reload the updated sales number
                    loadCurrentSales();
                }
            } catch (error) {
                console.error('Error adding sale:', error);
                showStatus('Error adding sale. Please try again.', 'error');
            }
        }
        
        // Function to reset sales (admin only)
        async function resetSales() {
            if (confirm('⚠️ Are you sure you want to reset ALL sales? This affects everyone!')) {
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=reset`);
                    await response.text();
                    showStatus('Sales reset to 0', 'success');
                    loadCurrentSales();
                } catch (error) {
                    console.error('Error resetting sales:', error);
                    showStatus('Error resetting sales', 'error');
                }
            }
        }
        
        // Helper function to show status messages
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                if (statusDiv.innerText === message) {
                    statusDiv.innerText = '';
                    statusDiv.className = 'status';
                }
            }, 3000);
        }
        
        // Load sales when page opens
        loadCurrentSales();
    </script>
</body>
</html>
